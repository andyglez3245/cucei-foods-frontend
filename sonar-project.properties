# Configuración de SonarQube para cucei-foods-frontend

# Datos del proyecto
sonar.projectKey=cucei-foods-frontend
sonar.projectName=CUCEI Foods Frontend
sonar.projectVersion=1.0.0

# Directorio raíz del proyecto
sonar.sources=app/js,login/js
sonar.tests=__tests__

# Configuración de inclusiones/exclusiones para tests
sonar.test.inclusions=**/*.spec.js
sonar.test.exclusions=

# Archivos a excluir del análisis
sonar.exclusions=**/node_modules/**,**/coverage/**
sonar.sourceExclusions=**/*.spec.js

# Configuración de cobertura de código (Jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Lenguaje
sonar.language=js

# Encoding
sonar.sourceEncoding=UTF-8

# URL de SonarQube (ajusta si es diferente)
# sonar.host.url=http://localhost:9000
# sonar.login=tu_token_aqui
